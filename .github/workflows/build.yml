name: Build ZMK Firmware (all boards)

# Syncs go60 layer changes to the other boards, validates the synced tree,
# then builds firmware for all 3 keyboards on every commit to main.
# Artifacts are uploaded for each board and available for download on the
# Actions run page (retention bounded by the repository's artifact cap).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # Sync go60 -> glove80/slicemk and publish the synced tree for downstream jobs.
  sync-keymaps:
    name: Sync keymaps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run keymap sync script
        run: bash scripts/keymapsync.sh

      - name: Upload synced workspace
        uses: actions/upload-artifact@v6
        with:
          name: synced-workspace
          path: .
          include-hidden-files: true
          retention-days: 1

      # Drift gate: Go60 is the source of truth. If running sync produced any
      # change to tracked files, the committed Glove80/SliceMK derived files
      # were stale. Fail here so derived files cannot drift silently in the repo.
      - name: Fail if committed derived files are stale
        run: |
          if git diff --quiet; then
            echo "Derived board files are in sync with Go60."
            exit 0
          fi
          echo "::error title=Stale derived board files::Derived Glove80/SliceMK files are out of sync with Go60. Run scripts/keymapsync.sh and commit the result."
          echo ""
          echo "Go60 is the source of truth for shared layer bindings. A change landed in"
          echo "boards/go60/layers/ (or shared content) without re-running the sync and"
          echo "committing the regenerated Glove80/SliceMK layer files."
          echo ""
          echo "Fix locally and recommit:"
          echo "    bash scripts/keymapsync.sh"
          echo "    git add -A && git commit"
          echo ""
          echo "Files the sync would change (these must be committed):"
          git --no-pager diff --stat
          echo ""
          git --no-pager diff
          exit 1

  # Validation runs against the synced workspace and gates all builds.
  validate:
    name: Validate config
    needs: sync-keymaps
    runs-on: ubuntu-latest
    steps:
      - name: Download synced workspace
        uses: actions/download-artifact@v6
        with:
          name: synced-workspace
          path: .

      - name: Run validation script
        run: bash scripts/validation.sh

      - name: Run keymapsync fixture tests
        run: bash tests/keymapsync_test.sh

  # Go60 (Nix)
  build-go60:
    name: Build Go60
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Download synced workspace
        uses: actions/download-artifact@v6
        with:
          name: synced-workspace
          path: .

      - name: Checkout moergo-sc/zmk
        uses: actions/checkout@v5
        with:
          repository: moergo-sc/zmk
          ref: main
          path: src

      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-22.05

      - uses: cachix/cachix-action@v17
        with:
          name: moergo-glove80-zmk-dev
          skipPush: true

      - name: Build Go60 firmware
        run: nix-build build/go60.nix --arg firmware 'import ./src {}' -o result-go60

      - name: Upload Go60 firmware
        uses: actions/upload-artifact@v6
        with:
          name: go60-firmware
          path: result-go60/go60.uf2
          retention-days: 7

  # Glove80 (Nix — same fork as Go60)
  build-glove80:
    name: Build Glove80
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Download synced workspace
        uses: actions/download-artifact@v6
        with:
          name: synced-workspace
          path: .

      - name: Checkout moergo-sc/zmk
        uses: actions/checkout@v5
        with:
          repository: moergo-sc/zmk
          ref: main
          path: src

      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-22.05

      - uses: cachix/cachix-action@v17
        with:
          name: moergo-glove80-zmk-dev
          skipPush: true

      - name: Build Glove80 firmware
        run: nix-build build/glove80.nix --arg firmware 'import ./src {}' -o result-glove80

      - name: Upload Glove80 firmware
        uses: actions/upload-artifact@v6
        with:
          name: glove80-firmware
          path: result-glove80/glove80.uf2
          retention-days: 7

  # SliceMK (west)
  build-slicemk:
    name: Build SliceMK ErgoDox
    needs: validate
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    env:
      BUILD_DIR: .ci-build/slicemk
    steps:
      - name: Download synced workspace
        uses: actions/download-artifact@v6
        with:
          name: synced-workspace
          path: .

      - name: Create build directory
        run: mkdir -p "$BUILD_DIR"

      - name: Cache west modules
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-slicemk-west-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-slicemk-west-
            ${{ runner.os }}-

      - name: West init
        run: west init -l config

      - name: West update
        run: west update --fetch-opt=--filter=tree:0

      - name: West zephyr export
        run: west zephyr-export

      - name: Build SliceMK firmware
        run: >-
          west build -s zmk/app -d "$BUILD_DIR"
          -b slicemk_ergodox_202207_green_left --
          -DZMK_CONFIG="$GITHUB_WORKSPACE/config"
          -DSHIELD="slicemk_ergodox_leftcentral"

      - name: Upload SliceMK firmware
        uses: actions/upload-artifact@v6
        with:
          name: slicemk-firmware
          path: .ci-build/slicemk/zephyr/zmk.uf2
          retention-days: 7
